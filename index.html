<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>한국일보 트래픽 개선 점검</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2c3e50; --bg: #f4f7f6; }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: var(--bg); }
        #login-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--primary); color:white; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:1000; }
        #login-screen input { padding: 12px; border-radius: 8px; border:none; width:220px; margin-top:15px; text-align:center; }
        header { background: white; padding: 25px; text-align: center; border-bottom: 3px solid var(--primary); }
        .container { max-width: 1000px; margin: 20px auto; padding: 0 20px; }
        .main-block { background: white; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); overflow: hidden; }
        .block-header { padding: 20px; cursor: pointer; display: flex; justify-content: space-between; font-weight: bold; background: #fff; }
        .sub-container { display: none; padding: 15px 20px; border-top: 1px solid #eee; background: #fafafa; }
        .sub-title { padding: 12px; background: #e2e8f0; border-radius: 6px; cursor: pointer; margin-top: 10px; font-weight: 600; }
        .data-content { display: none; padding: 15px 5px; }
        table { width: 100%; border-collapse: collapse; background: white; font-size: 0.85rem; }
        th, td { border: 1px solid #cbd5e0; padding: 10px; text-align: center; }
        th { background: #edf2f7; }
        .chart-container { position: relative; height: 350px; width: 100%; }
        .footnote { padding: 15px; font-size: 0.8rem; color: #718096; background: #fffaf0; border-top: 1px solid #feebc8; }
    </style>
</head>
<body>

<div id="login-screen">
    <h2>한국일보 트래픽 점검</h2>
    <input type="password" id="pw" placeholder="비밀번호 입력" onkeypress="if(event.keyCode==13) verify()">
</div>

<div id="wrapper" style="display:none;">
    <header>
        <h1>한국일보 트래픽 개선 점검</h1>
        <p>만든이: 김주성 | 날짜: 2026.05.15</p>
    </header>

    <div class="container">
        <div class="main-block">
            <div class="block-header" onclick="toggle(this)">1. 주요트래픽추이 <span>+</span></div>
            <div class="sub-container">
                <div class="sub-title" onclick="toggle(this)">1. 닷컴 트래픽 추이 (표)</div>
                <div class="data-content" id="table-1-1">로딩 중...</div>
                
                <div class="sub-title" onclick="toggle(this)">2. 유입경로별 방문자수 추이 (누적 막대)</div>
                <div class="data-content"><div class="chart-container"><canvas id="chart-1-2"></canvas></div></div>
                
                <div class="sub-title" onclick="toggle(this)">3. 외부 포털 트래픽 추이 (선형 차트)</div>
                <div class="data-content"><div class="chart-container"><canvas id="chart-1-3"></canvas></div></div>
            </div>
            <div class="footnote" id="note-1">각주 로딩 중...</div>
        </div>

        </div>
</div>

<script>
    const PASS = "2580";
    const S_ID = "14mOvdmVfVP5ck9L2hKQQppgbFjjYAa3DCfoG2sehQh0";

    function verify() {
        if(document.getElementById('pw').value === PASS) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('wrapper').style.display = 'block';
            loadData();
        } else { alert("비밀번호 오류"); }
    }

    function toggle(el) {
        const next = el.nextElementSibling;
        if(next && (next.classList.contains('sub-container') || next.classList.contains('data-content'))) {
            next.style.display = next.style.display === 'block' ? 'none' : 'block';
        }
    }

    async function loadData() {
        try {
            // 1번 시트 (GID=0) 데이터 가져오기
            const url = `https://docs.google.com/spreadsheets/d/${S_ID}/gviz/tq?tqx=out:csv&gid=0`;
            const res = await fetch(url);
            const text = await res.text();
            
            // CSV 파싱 (큰따옴표 제거 로직 포함)
            const rows = text.split('\n').map(row => row.split(',').map(cell => cell.replace(/^"|"$/g, '')));

            // 표 1-1 (시트의 A1~E5 영역 가정)
            renderTable('table-1-1', rows.slice(0, 6));

            // 차트 1-3 (선형 차트 - 시트의 특정 행 데이터 추출)
            const labels = rows[0].slice(1, 7); // 월 (B1~G1)
            const trafficData = rows[1].slice(1, 7).map(v => parseFloat(v.replace(/,/g, '')) || 0);

            new Chart(document.getElementById('chart-1-3'), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{ label: '트래픽 추이', data: trafficData, borderColor: '#3498db', fill: false }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            // 각주 업데이트 (시트 마지막 줄 어딘가)
            document.getElementById('note-1').innerText = "각주: " + (rows[15] ? rows[15][0] : "시트 내용을 확인하세요.");

        } catch (e) {
            console.error("Data Load Error:", e);
            document.getElementById('table-1-1').innerText = "데이터를 불러오지 못했습니다. 시트 공유 설정을 확인하세요.";
        }
    }

    function renderTable(id, data) {
        let html = '<table>';
        data.forEach((row, i) => {
            html += '<tr>';
            row.forEach(cell => {
                html += i === 0 ? `<th>${cell}</th>` : `<td>${cell}</td>`;
            });
            html += '</tr>';
        });
        html += '</table>';
        document.getElementById(id).innerHTML = html;
    }
</script>
</body>
</html>
