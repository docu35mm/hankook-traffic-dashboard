<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>한국일보 트래픽 개선 점검</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary-color: #2c3e50; }
        body { font-family: 'Pretendard', sans-serif; margin: 0; padding: 20px; background: #f8f9fa; }
        
        /* 암호창 */
        #login-screen { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: #2c3e50; color:white; display:flex; flex-direction:column; 
            align-items:center; justify-content:center; z-index:1000;
        }
        #login-screen input { padding: 12px; border-radius: 8px; border:none; width:200px; margin-top:15px; text-align:center; }

        header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #333; padding-bottom: 15px; }
        .main-block { background: #fff; border: 1px solid #ddd; margin-bottom: 10px; border-radius: 8px; }
        .block-header { padding: 20px; cursor: pointer; display: flex; justify-content: space-between; font-weight: bold; }
        .sub-content { display: none; padding: 20px; border-top: 1px solid #eee; }
        .chart-container { width: 100%; height: 350px; }
        .footnote { padding: 15px; background: #fffbe6; font-size: 0.9rem; border-top: 1px solid #ffe58f; }
    </style>
</head>
<body>

<div id="login-screen">
    <h2>🔒 보안 인증</h2>
    <p>비밀번호를 입력하고 Enter를 누르세요.</p>
    <input type="password" id="pw" placeholder="Password" onkeypress="if(event.keyCode==13) verify()">
</div>

<div id="wrapper" style="visibility: hidden;">
    <header>
        <h1>한국일보 트래픽 개선 점검</h1>
        <p>만든이: 김주성 | 날짜: 2026.05.15</p>
    </header>

    <div class="main-block">
        <div class="block-header" onclick="toggle(this)">
            <span>1. 주요트래픽추이</span><span>+</span>
        </div>
        <div class="sub-content">
            <p><strong>└ 주요 트래픽 선형 차트</strong></p>
            <div class="chart-container">
                <canvas id="trafficChart"></canvas>
            </div>
        </div>
        <div id="note1" class="footnote">각주: 데이터를 불러오는 중...</div>
    </div>
</div>

<script>
    const PASS = "1234"; // 비밀번호 설정
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSJ8Y4cUPlk5PCmZyt9qcCdGIUCuLaUdSMlOUWLshCiGvVGwar6Qc9DA2JWPF56WFms4ArBSNayUwPm/pub?output=csv";

    function verify() {
        if(document.getElementById('pw').value === PASS) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('wrapper').style.visibility = 'visible';
            fetchData();
        } else {
            alert("틀렸습니다.");
        }
    }

    async function fetchData() {
        try {
            const res = await fetch(CSV_URL);
            const text = await res.text();
            // CSV 파싱 (줄바꿈 및 쉼표 기준)
            const rows = text.split('\n').map(row => row.split(','));

            /* [데이터 매칭 가이드] 
               rows[3][1] = B4 셀 (주요 트래픽 값)
               rows[4][1] = B5 셀
            */
            const trafficValues = [
                parseFloat(rows[3][1]), 
                parseFloat(rows[4][1]), 
                parseFloat(rows[5][1])
            ].filter(v => !isNaN(v));

            drawChart(trafficValues);
            
            // 각주 매칭 (예: 시트의 특정 위치)
            if(rows[10]) document.getElementById('note1').innerText = "각주: " + rows[10][0];
            
        } catch (e) {
            console.error("데이터 로드 에러:", e);
        }
    }

    function drawChart(dataPoints) {
        new Chart(document.getElementById('trafficChart'), {
            type: 'line',
            data: {
                labels: ['3월', '4월', '5월', '6월'].slice(0, dataPoints.length),
                datasets: [{
                    label: '트래픽 수치',
                    data: dataPoints,
                    borderColor: '#3498db',
                    tension: 0.3,
                    fill: true,
                    backgroundColor: 'rgba(52, 152, 219, 0.1)'
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    function toggle(el) {
        const content = el.nextElementSibling;
        content.style.display = (content.style.display === 'block') ? 'none' : 'block';
    }
</script>
</body>
</html>
